name: Build Next.js Standalone

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 🔥 BU SATIR ÖNEMLİ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Dependency kur
        run: npm install

      - name: Build al
        run: npm run build

      - name: Standalone çıktıyı hazırla
        run: |
          mkdir -p output/.next

          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/* output/
          else
            echo "Standalone build bulunamadı!"
            exit 1
          fi

          if [ -d ".next/static" ]; then
            cp -r .next/static output/.next/
          fi

          if [ -d "public" ]; then
            cp -r public output/
          fi

      - name: Build branch'e push et
        run: |
          cd output
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Build output"

          git branch -M build
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push -f origin build

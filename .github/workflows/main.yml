name: Build Next.js Standalone & Binary

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Dependency kur
        run: npm install

      - name: Build al
        run: npm run build

      - name: Binary Oluştur (ARM64)
        run: |
          # Standalone klasörüne girip binary'yi orada üretmek yolları kısaltır
          cd .next/standalone
          # npx kullanarak sistemdeki diğer 'pkg' komutuyla çakışmayı önlüyoruz
          npx pkg server.js --targets node20-linux-arm64 --output ../../next-app-arm64

      - name: Standalone çıktıyı hazırla
        run: |
          mkdir -p output/.next

          # Standalone dosyalarını kopyala
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/* output/
          else
            echo "Standalone build bulunamadı!"
            exit 1
          fi

          # Statik dosyaları kopyala
          if [ -d ".next/static" ]; then
            cp -r .next/static output/.next/
          fi

          if [ -d "public" ]; then
            cp -r public output/
          fi
          
          # Ürettiğimiz Binary dosyasını da output klasörüne taşı
          mv next-app-arm64 output/

      - name: Build branch'e push et
        run: |
          cd output
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Build output with ARM64 binary"

          git branch -M build
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push -f origin build
